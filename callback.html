<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeRider – Logging in…</title>
    <style>
        body {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            background: #001a2e;
            color: #00ffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            gap: 20px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(0,255,255,0.2);
            border-top-color: #00ffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        .error { color: #ff4444; font-size: 1rem; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p id="status">Completing login…</p>
    <p id="error" class="error" hidden></p>

    <!-- Only load what's needed for the callback -->
    <script src="config.js"></script>
    <script src="src/auth/auth-manager.js"></script>

    <script>
        (async function handleCallback() {
            const statusEl = document.getElementById('status');
            const errorEl  = document.getElementById('error');

            try {
                const params       = new URLSearchParams(window.location.search);
                const code         = params.get('code');
                const state        = params.get('state');
                const errorParam   = params.get('error');

                if (errorParam) {
                    throw new Error('Spotify denied access: ' + errorParam);
                }

                if (!code) {
                    throw new Error('No authorization code received from Spotify.');
                }

                // CSRF state check
                const storedState = sessionStorage.getItem('spotify_auth_state');
                if (state !== storedState) {
                    throw new Error('State mismatch – possible CSRF attack.');
                }

                const codeVerifier = sessionStorage.getItem('spotify_code_verifier');
                if (!codeVerifier) {
                    throw new Error('Code verifier missing. Please try logging in again.');
                }

                statusEl.textContent = 'Exchanging token…';

                // Exchange code for access token
                const response = await fetch(VIBE_CONFIG.spotify.tokenEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id:     VIBE_CONFIG.spotify.clientId,
                        grant_type:    'authorization_code',
                        code:          code,
                        redirect_uri:  VIBE_CONFIG.spotify.redirectUri,
                        code_verifier: codeVerifier
                    })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(`Token exchange failed (${response.status}): ${err.error_description || response.statusText}`);
                }

                const data = await response.json();

                AuthManager.setAccessToken(
                    data.access_token,
                    data.expires_in || 3600,
                    data.refresh_token || null
                );

                // Clean up PKCE params
                sessionStorage.removeItem('spotify_code_verifier');
                sessionStorage.removeItem('spotify_auth_state');

                statusEl.textContent = 'Login successful! Redirecting…';

                // Redirect based on whether we're running locally or on GitHub Pages
                const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
                const base = isLocalhost ? '/' : '/VibeRider/';
                window.location.replace(base);

            } catch (err) {
                console.error('Callback error:', err);
                statusEl.textContent = 'Login failed';
                errorEl.textContent  = err.message;
                errorEl.hidden = false;

                // Auto-redirect to home after 5 s so user can retry
                setTimeout(() => {
                    const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
                    window.location.replace(isLocalhost ? '/' : '/VibeRider/');
                }, 5000);
            }
        })();
    </script>
</body>
</html>
